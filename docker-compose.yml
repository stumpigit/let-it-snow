version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: letitsnow
      POSTGRES_PASSWORD: letitsnow
      POSTGRES_DB: letitsnow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql://letitsnow:letitsnow@postgres:5432/letitsnow
      - REDIS_URL=redis://redis:6379/0
      - WINTERMAKER_PATH=/app/pipeline/wintermaker
      - WINTERMAKER_DATA=/app/data
    volumes:
      - ./data:/app/data
      - ./pipeline/wintermaker:/app/pipeline/wintermaker:ro
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  pgdata:
  redisdata:
